name: grocery_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.10.0
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  equatable: ^2.1.0
  flutter_secure_storage: ^9.2.2
  shimmer: ^3.0.0
  hydrated_bloc: ^11.0.0
  path_provider: ^2.1.1
  animated_theme_switcher: ^2.0.10
  get: ^4.6.5
  carousel_slider: ^5.0.0
  flutter_rating_bar: ^4.0.1
  lottie: ^3.0.0
  badges: ^3.1.2
  shared_preferences: ^2.2.2
  flutter_email_sender: ^8.0.0
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/bestfood/
    - assets/images/menus/
    - assets/images/popular_foods/
    - assets/images/topmenu/
